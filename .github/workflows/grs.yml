name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          # username=justorez&theme=vue&show_icons=true&hide_title=true&hide_border=true
          card: stats
          options: username=${{ github.repository_owner }}&theme=vue&show_icons=true&hide_title=true&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Generate top-langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          # username=justorez&theme=vue&layout=compact&hide_border=true&hide=html
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=vue&layout=compact&hide_border=true&hide=html
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push